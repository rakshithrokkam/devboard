version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    container_name: devboard-frontend
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: devboard-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/devboard
    
  mongo:
    image: mongo:6-jammy
    container_name: devboard-mongo
    restart: unless-stopped
    volumes:
      - devboard-mongo-data:/data/db

  nginx:
    image: nginx:alpine
    container_name: devboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  devboard-mongo-data:
